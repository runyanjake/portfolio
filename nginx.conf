server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/index.html =404;
    }

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /themes/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    error_page 404 /404.html;
}
